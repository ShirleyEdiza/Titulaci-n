<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer contraseña - SpeakApp</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(#1A237E, #283593);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .card {
      background: white;
      width: 100%;
      max-width: 420px;
      padding: 28px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    h1 {
      color: #1A237E;
      font-size: 24px;
      margin-bottom: 4px;
    }

    p {
      color: #666;
      font-size: 13px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 12px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 14px;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #B71C1C;
      color: white;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }

    .req {
      font-size: 13px;
      margin-top: 6px;
    }

    .ok { color: green; }
    .bad { color: red; }

    .msg {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
    }

    .error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ef9a9a;
    }

    .success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #a5d6a7;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Restablecer contraseña</h1>
    <p>Ingresa tu nueva contraseña siguiendo los requisitos de seguridad.</p>

    <input type="password" id="password" placeholder="Nueva contraseña" oninput="validar()" />
    <input type="password" id="confirmPassword" placeholder="Confirmar contraseña" oninput="validar()" />

    <div id="requisitos">
      <div id="r1" class="req bad">✕ Mínimo 8 caracteres</div>
      <div id="r2" class="req bad">✕ Una letra mayúscula</div>
      <div id="r3" class="req bad">✕ Una letra minúscula</div>
      <div id="r4" class="req bad">✕ Un número</div>
      <div id="r5" class="req bad">✕ Un carácter especial</div>
      <div id="r6" class="req bad">✕ Las contraseñas coinciden</div>
    </div>

    <button onclick="cambiarPassword()">Actualizar contraseña</button>

    <div id="mensaje"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, verifyPasswordResetCode, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBzNHR_PQaBYcTLy6a_qOtunmWowohEbCk",
      authDomain: "asistente-conversacional-bdebb.firebaseapp.com",
      projectId: "asistente-conversacional-bdebb",
      storageBucket: "asistente-conversacional-bdebb.firebasestorage.app",
      messagingSenderId: "436921790012",
      appId: "1:436921790012:web:f803383b7797d9d3f31d39"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const params = new URLSearchParams(window.location.search);
    const oobCode = params.get("oobCode");

    function mostrarMensaje(texto, tipo) {
      const div = document.getElementById("mensaje");
      div.className = "msg " + tipo;
      div.innerText = texto;
    }

    window.validar = function () {
      const pass = document.getElementById("password").value;
      const confirm = document.getElementById("confirmPassword").value;

      const reglas = [
        pass.length >= 8,
        /[A-Z]/.test(pass),
        /[a-z]/.test(pass),
        /[0-9]/.test(pass),
        /[!@#$&*~%^()_+]/.test(pass),
        pass === confirm && pass.length > 0
      ];

      reglas.forEach((ok, i) => {
        const item = document.getElementById("r" + (i + 1));
        item.className = "req " + (ok ? "ok" : "bad");
        item.innerText = (ok ? "✓ " : "✕ ") + item.innerText.substring(2);
      });

      return reglas.every(Boolean);
    }

    window.cambiarPassword = async function () {
      const pass = document.getElementById("password").value;

      if (!oobCode) {
        mostrarMensaje("El enlace no es válido o está incompleto.", "error");
        return;
      }

      if (!validar()) {
        mostrarMensaje("La contraseña no cumple los requisitos de seguridad.", "error");
        return;
      }

      try {
        await verifyPasswordResetCode(auth, oobCode);
        await confirmPasswordReset(auth, oobCode, pass);

        mostrarMensaje("Contraseña actualizada correctamente. Ahora puedes iniciar sesión en la aplicación.", "success");
      } catch (error) {
        mostrarMensaje("El enlace expiró o ya fue utilizado. Solicita uno nuevo desde la aplicación.", "error");
      }
    }
  </script>
</body>
</html>
